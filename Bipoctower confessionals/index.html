<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confessional Upload</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f7f7f7;
      color: #333;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      background: #fff;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      max-width: 500px;
      width: 100%;
      text-align: center;
    }

    h1 {
      margin-top: 0;
      color: #111;
    }

    p {
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }

    input[type="file"] {
      display: block;
      margin: 0.75rem auto 1.5rem;
    }

    .button {
      display: inline-block;
      background: #0d6efd;
      color: #fff;
      padding: 0.9rem 1.6rem;
      border: none;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      cursor: pointer;
    }

    .button:hover {
      background: #0b5ed7;
    }

    .help-link {
      display: block;
      margin-top: 1rem;
      color: #0d6efd;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Hello World</h1>
    <p>Upload an MP4 from your PC or phone to start your confessional video.</p>

    <form id="upload-form" action="/upload" method="post" enctype="multipart/form-data">
      <label for="video-upload">Choose a video file</label>
      <input id="video-upload" name="video" type="file" accept="video/mp4" />
      <button id="upload-button" class="button" type="button">Upload</button>
      <div id="upload-status" aria-live="polite" style="min-height: 1.4rem; margin-top: 1rem; visibility: hidden;"></div>
    </form>

    <a class="help-link" href="advice.html">Advice for making good confessional videos</a>
  </div>

  <script>
    const uploadButton = document.getElementById('upload-button');
    const fileInput = document.getElementById('video-upload');
    const statusEl = document.getElementById('upload-status');

    function showStatus(message, isError = false) {
      statusEl.textContent = message;
      statusEl.style.color = isError ? '#d92f2f' : '#0d6efd';
      statusEl.style.visibility = 'visible';
    }

    uploadButton.addEventListener('click', async () => {
      if (!fileInput.files.length) {
        showStatus('Please select an MP4 file to upload.', true);
        return;
      }

      const file = fileInput.files[0];
      if (!file.type.includes('mp4')) {
        showStatus('Only MP4 files are accepted.', true);
        return;
      }

      const formData = new FormData();
      formData.append('video', file);

      uploadButton.disabled = true;
      uploadButton.textContent = 'Uploading...';
      showStatus('Uploading your file...', false);

      try {
        const response = await fetch('/upload', {
          method: 'POST',
          body: formData,
        });

        if (response.ok) {
          window.location.href = 'upload-success.html';
          return;
        }

        window.location.href = 'upload-failure.html';
      } catch (error) {
        console.error('Upload failed:', error);
        window.location.href = 'upload-failure.html';
      } finally {
        uploadButton.disabled = false;
        uploadButton.textContent = 'Upload';
      }
    });
  </script>
</body>
</html>
