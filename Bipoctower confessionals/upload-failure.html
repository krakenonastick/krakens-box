<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload Failed</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #fff4f4;
      color: #581b18;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      background: #fff;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      max-width: 540px;
      width: 100%;
      text-align: center;
    }

    h1 {
      margin-top: 0;
      color: #b02a37;
    }

    p {
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }

    a {
      display: inline-block;
      background: #0d6efd;
      color: #fff;
      padding: 0.9rem 1.6rem;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
    }

    a:hover {
      background: #0b5ed7;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Upload Failed</h1>
    <p>Something went wrong while uploading your file. Please try again, or check that your server endpoint is available.</p>
    <a href="index.html">Try again</a>
  </div>
</body>
</html>
